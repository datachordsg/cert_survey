<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Thank You</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css" />
</head>
<body class="thankyou-body">
  <div class="ambient ambient--one"></div>
  <div class="ambient ambient--two"></div>
  <main class="thankyou-shell">
    <section class="thankyou-card">
      <div class="thankyou-badge">Submission received</div>
      <div class="thankyou-orbit" aria-hidden="true">
        <div class="thankyou-orbit__ring thankyou-orbit__ring--one"></div>
        <div class="thankyou-orbit__ring thankyou-orbit__ring--two"></div>
        <div class="thankyou-orbit__core"></div>
      </div>
      <h1>Thank you for your participation.</h1>
      <p>We are brewing something very exciting and impactful!</p>
    </section>
  </main>
</body>
</html>
